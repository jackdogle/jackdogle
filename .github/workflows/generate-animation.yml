name: Generate Profile Animation

on:
  workflow_dispatch: # Bisa dijalankan manual
  schedule:
    - cron: '0 0 * * 1' # Update tiap minggu
  push:
    branches:
      - main
    paths:
      - '.github/workflows/generate-animation.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install Pillow requests

      - name: Generate GIF
        run: |
          python -c "
          import requests
          from PIL import Image, ImageDraw, ImageOps
          from io import BytesIO

          def create_circular_mask(size):
              mask = Image.new('L', size, 0)
              draw = ImageDraw.Draw(mask)
              draw.ellipse((0, 0) + size, fill=255)
              return mask

          def process_image(url, size):
              try:
                  response = requests.get(url)
                  if response.status_code != 200: return None
                  img = Image.open(BytesIO(response.content)).convert('RGBA')
                  mask = create_circular_mask(size)
                  img = ImageOps.fit(img, size, centering=(0.5, 0.5))
                  img.putalpha(mask)
                  # Tambah border Cyan
                  border_color = (54, 188, 247, 255)
                  circle_img = Image.new('RGBA', size, (0, 0, 0, 0))
                  draw = ImageDraw.Draw(circle_img)
                  draw.ellipse((0, 0, size[0]-1, size[1]-1), outline=border_color, width=5)
                  return Image.alpha_composite(img, circle_img)
              except: return None

          size = (200, 200)
          # Ambil foto profil user & logo github
          img1 = process_image('https://github.com/${{ github.repository_owner }}.png', size)
          img2 = process_image('https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png', size)

          if img1 and img2:
              frames = [img1] * 20 + [img2] * 20
              img1.save('profile_animation.gif', save_all=True, append_images=frames[1:], duration=100, loop=0, disposal=2)
              print('GIF Generated Successfully')
          "

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add profile_animation.gif
          git commit -m "Update profile animation" || exit 0
          git push
